{% extends 'base.html' %}
{% block title %}Demande envoyée | Teranga Aquaville{% endblock %}

{% block content %}
<section class="succes section">
  <div class="container">
    <div class="succes__content" data-aos="fade-up">
      <div class="succes__icon">
        <span class="material-icons-round">check_circle</span>
      </div>
      <h1>Votre demande a bien été envoyée !</h1>
      <p>Notre équipe vous contactera sous <strong>24 heures</strong> pour donner suite à votre demande.</p>
      <div class="succes__actions">
        <a href="{% url 'home' %}" class="btn btn--primary">Retour à l'accueil</a>
        <a href="{% url 'villas_vente' %}" class="btn btn--outline">Voir les villas</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
